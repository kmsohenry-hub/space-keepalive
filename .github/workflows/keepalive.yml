name: Keep HF Spaces Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Open WebUI Space
        run: curl -sSf https://ksmdaryl-VOTRE-SPACE-OPENWEBUI.hf.space/ -o /dev/null

      - name: Ping open-terminal Space
        run: curl -sSf https://ksmdaryl-open-terminal.hf.space/ -o /dev/null

      - name: Ping google-workspace-mcp Space
        run: curl -sSf https://ksmdaryl-google-workspace-mcp.hf.space/ -o /dev/null
