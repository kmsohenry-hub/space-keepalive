name: Keep HF Spaces Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Hugging Face Spaces
        shell: bash
        env:
          SPACES: |
            https://ksmdaryl-openwebui.hf.space/
            https://ksmdaryl-open-terminal.hf.space/
            https://ksmdaryl-google-workspace-mcp.hf.space/
            https://manchabt-hf-docling-serve.hf.space/
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "Ping: $url"
            curl -sS --connect-timeout 10 --max-time 20 -L "$url" -o /dev/null || echo "Warning: failed for $url"
          done <<< "$SPACES"
